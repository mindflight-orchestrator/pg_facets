# PostgreSQL Configuration for pg_facets
# Optimized for faceted search workloads

# Basic Settings
listen_addresses = '*'
max_connections = 300
shared_buffers = 4GB
work_mem = 128MB
maintenance_work_mem = 512MB
effective_cache_size = 12GB
huge_pages = try

# WAL Settings
wal_level = logical
max_wal_size = 4GB
min_wal_size = 1GB
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# Background Writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 1000
bgwriter_lru_multiplier = 10.0

# Parallel Query Settings
max_worker_processes = 16
max_parallel_workers_per_gather = 8
max_parallel_workers = 16
max_parallel_maintenance_workers = 4
parallel_leader_participation = on

# Query Planning
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 500

# Memory Settings for Extensions
maintenance_work_mem = 1GB
max_stack_depth = 7MB

# Autovacuum Settings
autovacuum = on
autovacuum_max_workers = 6
autovacuum_naptime = 15s
autovacuum_vacuum_threshold = 25
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_threshold = 10
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_cost_limit = 2000

# JIT Settings
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# Logging Settings
log_destination = 'csvlog'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 250ms
log_error_verbosity = default
# Enable NOTICE and LOG level messages for debugging
log_min_messages = notice
client_min_messages = notice

# Extension-specific settings
# pg_cron omitted - not in TimescaleDB HA or pgvector base; use root docker/Dockerfile.postgres for pg_cron
shared_preload_libraries = 'pg_stat_statements,vector,roaringbitmap'

# Client Connection Defaults
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# Statement Behavior
idle_in_transaction_session_timeout = 60000
statement_timeout = 7200000
lock_timeout = 1800000

# Replication
max_wal_senders = 10
max_replication_slots = 10

