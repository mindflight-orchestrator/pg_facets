# pg_facets - Vendored PostgreSQL build (Option A)
# Requires: ./scripts/setup_pg17_submodule.sh (run from repo root first)
# Build context: repository root

services:
  pg_facets:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vendored
    container_name: pg_facets
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - pg_facets_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_facets_data:
    driver: local
